<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChemReviewLab | Unit 2 Chemistry Review Arcade</title>
<style>
:root{
  --bg:#07111f;--panel:#0f1d2f;--panel2:#14263d;--blue:#35a7ff;--green:#4ade80;
  --gold:#fbbf24;--red:#fb7185;--text:#f8fafc;--muted:#b6c3d1;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#12365d,#07111f 55%);color:var(--text)}
.app-shell{height:100vh;display:flex;flex-direction:column;padding:10px;gap:8px}
.app-header{display:flex;justify-content:space-between;align-items:center;background:rgba(15,29,47,.9);border:1px solid rgba(53,167,255,.25);border-radius:16px;padding:10px 14px;min-height:68px}
.brand-title{font-size:1.15rem;font-weight:800;color:var(--blue)}
.unit-title{font-size:.95rem;color:var(--muted)}
.mode-title{font-weight:800;color:var(--gold)}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.score-pill,.streak-pill,.topic-pill{padding:7px 10px;border-radius:999px;background:var(--panel2);border:1px solid rgba(255,255,255,.12);font-weight:700;font-size:.85rem}
.streak-pill{color:var(--green)}
.app-main{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
.screen{height:100%;min-height:0;display:none}
.screen.active{display:flex;flex-direction:column}
.mode-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-content:center}
.mode-card{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid rgba(53,167,255,.25);border-radius:18px;padding:18px;cursor:pointer;box-shadow:0 12px 24px rgba(0,0,0,.25)}
.mode-card:hover{outline:2px solid var(--blue);transform:translateY(-1px)}
.mode-card h2{margin:0 0 8px;color:var(--gold)}
.mode-card p{margin:0;color:var(--muted);line-height:1.35}
.question-card{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;gap:10px;background:rgba(15,29,47,.93);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:14px}
.boss-banner{display:none;text-align:center;background:linear-gradient(90deg,#7c2d12,#f59e0b,#7c2d12);padding:8px;border-radius:14px;font-weight:900;color:#fff}
.boss-banner.show{display:block}
.prompt{font-size:clamp(1.05rem,2.5vw,1.65rem);line-height:1.25;font-weight:800;text-align:center;margin:auto 0}
.answer-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.answer-btn{border:1px solid rgba(255,255,255,.16);background:#132842;color:var(--text);padding:13px;border-radius:14px;font-size:clamp(.92rem,1.6vw,1.08rem);font-weight:750;cursor:pointer;min-height:58px}
.answer-btn:hover{outline:2px solid var(--blue)}
.answer-btn.correct{background:#14532d}
.answer-btn.wrong{background:#7f1d1d}
.feedback-box{min-height:52px;background:rgba(255,255,255,.06);border-radius:14px;padding:10px;text-align:center;color:var(--muted);font-weight:650}
.nav-row{display:flex;gap:10px;justify-content:center}
button.primary{background:linear-gradient(90deg,var(--blue),#2563eb);color:white;border:0;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer}
button.secondary{background:#1e293b;color:white;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer}
.final-report{flex:1;overflow:auto;background:rgba(15,29,47,.94);border-radius:20px;padding:18px;border:1px solid rgba(255,255,255,.14)}
.final-report h2{color:var(--gold);margin-top:0}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.report-card{background:rgba(255,255,255,.06);border-radius:14px;padding:12px}
.app-footer{text-align:center;color:var(--muted);font-size:.8rem;min-height:18px}
.celebration-overlay{position:fixed;inset:0;pointer-events:none;display:none;align-items:center;justify-content:center;z-index:10;background:rgba(7,17,31,.35);font-size:clamp(2rem,6vw,5rem);font-weight:1000;text-align:center}
.celebration-overlay.show{display:flex;animation:fade .9s ease forwards}
.particle{position:fixed;top:-20px;font-size:22px;animation:fall 1.7s linear forwards;z-index:11}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
@keyframes fade{0%{opacity:0;transform:scale(.8)}20%{opacity:1;transform:scale(1.04)}100%{opacity:0;transform:scale(1)}}
@media(max-width:760px){
  .app-header{align-items:flex-start;gap:6px;flex-direction:column}
  .status-bar{justify-content:flex-start}
  .mode-grid{grid-template-columns:1fr}
  .answer-grid{grid-template-columns:1fr}
  .report-grid{grid-template-columns:1fr}
  .app-footer{display:none}
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div>
      <div class="brand-title">ChemReviewLab</div>
      <div class="unit-title">Unit 2 Chemistry Review Arcade</div>
      <div class="mode-title" id="currentModeLabel">Choose a mode</div>
    </div>
    <div class="status-bar">
      <div class="score-pill" id="scorePill">Score: 0/0</div>
      <div class="streak-pill" id="streakPill">Streak: 0</div>
      <div class="topic-pill" id="topicPill">Adaptive Review: Ready</div>
    </div>
  </header>

  <main class="app-main">
    <section id="menuScreen" class="screen active">
      <div class="mode-grid" id="modeGrid"></div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="question-card">
        <div class="boss-banner" id="bossBanner">BOSS LEVEL: Use the model, not just memory.</div>
        <div class="topic-pill" id="questionMeta">Topic</div>
        <div class="prompt" id="promptText">Question</div>
        <div class="answer-grid" id="answerGrid"></div>
        <div class="feedback-box" id="feedbackBox">Choose the best answer.</div>
        <div class="nav-row">
          <button class="secondary" onclick="goMenu()">Modes</button>
          <button class="primary" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
        </div>
      </div>
    </section>

    <section id="finalScreen" class="screen">
      <div class="final-report" id="finalReport"></div>
      <div class="nav-row" style="margin-top:8px">
        <button class="secondary" onclick="goMenu()">Back to Modes</button>
        <button class="primary" onclick="startMode(currentMode.id)">Play Again</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">OpenSciEd Chemistry C.2 Review Tool | No login | No student data stored</footer>
</div>

<div class="celebration-overlay" id="celebrationOverlay"></div>

<script>
const TOPICS = {
  subatomic_particles:"Subatomic Particles",
  attraction_repulsion:"Attraction & Repulsion",
  static_electricity:"Static Electricity",
  charge_interactions:"Charge Interactions",
  net_charge:"Net Charge",
  electron_transfer:"Electron Transfer",
  polarization:"Polarization",
  coulombs_law:"Coulomb's Law",
  lightning_formation:"Lightning Formation",
  ionized_air:"Ionized Air",
  conductors_insulators:"Conductors & Insulators",
  ionic_vs_molecular:"Ionic vs Molecular",
  dissolving_salt:"Dissolving Salt",
  aqueous_conductivity:"Aqueous Conductivity",
  lightning_safety:"Lightning Safety",
  model_explanations:"Model Explanations"
};

const celebrations = [
  "Electron Energy Surge!","Ionic Victory!","You’re Positively Charged!",
  "Bond Level: Strong!","Lightning Logic Unlocked!","Conductivity Combo!",
  "Nucleus-Level Thinking!","That Answer Was Electrifying!","Periodic Power-Up!",
  "Saltwater Superstar!","Ion Trail Activated!","Molecule Mastery!"
];

const chargeClashMode = {
id:"charge-clash",
title:"Charge Clash",
subtitle:"Master atoms, charge, attraction, repulsion, electron transfer, and polarization.",
  topics:[
    "charge_interactions",
    "attraction_repulsion",
    "static_electricity",
    "electron_transfer",
    "conductors_insulators"
  ],
    questions:[
    {
      id: "cc001",
      mode: "charge-clash",
      topic: "charge_interactions",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "Two objects both carry a positive charge. What happens when they are brought close together?",
      choices: [
        "They attract each other",
        "They repel each other",
        "Nothing happens",
        "They become neutral"
      ],
      answer: "They repel each other",
      explanation: "Like charges repel. Two positive objects push away from each other."
    },
 
    {
      id: "cc002",
      mode: "charge-clash",
      topic: "charge_interactions",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "A positive object and a negative object are placed near each other. What happens?",
      choices: [
        "They repel",
        "They attract",
        "They swap charges",
        "They both become neutral"
      ],
      answer: "They attract",
      explanation: "Opposite charges attract. A positive and negative object pull toward each other."
    },
 
    {
      id: "cc003",
      mode: "charge-clash",
      topic: "charge_interactions",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "Which statement about electric charge is correct?",
      choices: [
        "Like charges attract; opposite charges repel",
        "Like charges repel; opposite charges attract",
        "All charges attract each other",
        "Neutral objects always repel charged objects"
      ],
      answer: "Like charges repel; opposite charges attract",
      explanation: "This is the fundamental rule of electrostatics: like charges push apart, opposite charges pull together."
    },
 
    {
      id: "cc004",
      mode: "charge-clash",
      topic: "charge_interactions",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "Which subatomic particle carries a negative charge?",
      choices: [
        "Proton",
        "Neutron",
        "Electron",
        "Nucleus"
      ],
      answer: "Electron",
      explanation: "Electrons are negatively charged. They are the particles that move during charge transfer."
    },
 
    {
      id: "cc005",
      mode: "charge-clash",
      topic: "charge_interactions",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "Which subatomic particle carries a positive charge?",
      choices: [
        "Electron",
        "Neutron",
        "Proton",
        "Ion"
      ],
      answer: "Proton",
      explanation: "Protons are positively charged and are located in the nucleus of an atom."
    },
 
    {
      id: "cc006",
      mode: "charge-clash",
      topic: "attraction_repulsion",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "A negatively charged balloon is brought near a wall. The balloon sticks to the wall. What does this tell you about the wall?",
      choices: [
        "The wall must be negatively charged",
        "The wall must have a positive region near the balloon",
        "The wall has no charge and cannot interact",
        "The wall must have transferred electrons to the balloon"
      ],
      answer: "The wall must have a positive region near the balloon",
      explanation: "Attraction requires opposite charges. The negative balloon can only stick if the nearby wall surface has a positive region, produced by charge redistribution."
    },
 
    {
      id: "cc007",
      mode: "charge-clash",
      topic: "attraction_repulsion",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "Two negatively charged objects are brought near each other. What is the interaction?",
      choices: [
        "Attraction, because they are both charged",
        "Repulsion, because they have the same type of charge",
        "No interaction, because negative charges cancel",
        "Attraction, because negative charges always attract"
      ],
      answer: "Repulsion, because they have the same type of charge",
      explanation: "Like charges always repel, regardless of sign. Two negative objects push away from each other."
    },
 
    {
      id: "cc008",
      mode: "charge-clash",
      topic: "attraction_repulsion",
      difficulty: 2,
      type: "multiple_choice",
      prompt: "A charged rod is brought near small pieces of neutral paper. The paper pieces jump toward the rod. What best explains this?",
      choices: [
        "The paper pieces are permanently charged opposite to the rod",
        "The rod transfers charge directly to the paper before attraction occurs",
        "Charges inside the paper shift slightly, making the near side opposite to the rod",
        "Neutral objects are always attracted to any nearby object"
      ],
      answer: "Charges inside the paper shift slightly, making the near side opposite to the rod",
      explanation: "This is polarization. The rod's charge pushes or pulls electrons in the paper, creating an opposite charge on the near side. That opposite charge is attracted to the rod."
    },
 
    {
      id: "cc009",
      mode: "charge-clash",
      topic: "attraction_repulsion",
      difficulty: 2,
      type: "multiple_choice",
      prompt: "A positively charged rod is held near a neutral metal sphere without touching it. The near side of the sphere becomes negative. Why?",
      choices: [
        "The rod donated protons to the sphere",
        "Electrons in the sphere were attracted toward the rod and moved to the near side",
        "The sphere generated new negative charges in response to the rod",
        "Neutrons in the sphere converted to electrons"
      ],
      answer: "Electrons in the sphere were attracted toward the rod and moved to the near side",
      explanation: "The positive rod attracts electrons in the conductor. Electrons shift toward the rod, making that side negative and the far side positive."
    },
 
    {
      id: "cc010",
      mode: "charge-clash",
      topic: "attraction_repulsion",
      difficulty: 2,
      type: "multiple_choice",
      prompt: "After a charged rod is removed from near a neutral metal sphere, what happens to the sphere's charge distribution?",
      choices: [

        "The sphere retains the negative charge the rod gave it",
        "Electrons redistribute evenly and the sphere returns to neutral",
        "The sphere becomes permanently positive"
      ],
      answer: "Electrons redistribute evenly and the sphere returns to neutral",
      explanation: "Polarization is temporary. Once the external charge is removed, electrons spread back evenly and the object returns to an overall neutral state."
    },
 
    {
      id: "cc011",
      mode: "charge-clash",
      topic: "static_electricity",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "Static electricity most commonly builds up when:",
      choices: [
        "Two objects are placed far apart in a vacuum",
        "Two materials rub together and electrons transfer between them",
        "A metal wire connects two objects",
        "Water is poured between two surfaces"
      ],
      answer: "Two materials rub together and electrons transfer between them",
      explanation: "Friction can transfer electrons from one material to another, leaving one object with excess electrons (negative) and the other with a deficit (positive)."
    },
 
    {
      id: "cc012",
      mode: "charge-clash",
      topic: "static_electricity",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "When you rub a balloon on your hair, the balloon becomes negatively charged. What happened?",
      choices: [
        "Protons moved from your hair to the balloon",
        "Electrons moved from your hair to the balloon",
        "Neutrons moved from the balloon to your hair",
        "The balloon created new electrons from friction heat"
      ],
      answer: "Electrons moved from your hair to the balloon",
      explanation: "Rubbing transfers electrons. The balloon gains electrons from your hair, becoming negatively charged. Your hair loses electrons and becomes positively charged."
    },
 
    {
      id: "cc013",
      mode: "charge-clash",
      topic: "static_electricity",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "After rubbing a balloon on hair, the hair stands up and is attracted to the balloon. Why?",
      choices: [
        "The hair and balloon both became positive",
        "The hair became positive and the balloon became negative, so they attract",
        "Friction magnetized both the hair and balloon",
        "The hair and balloon exchanged neutrons"
      ],
      answer: "The hair became positive and the balloon became negative, so they attract",
      explanation: "Electron transfer left the hair with a positive charge and the balloon with a negative charge. Opposite charges attract."
    },
 
    {
      id: "cc014",
      mode: "charge-clash",
      topic: "static_electricity",
      difficulty: 2,
      type: "multiple_choice",
      prompt: "You shuffle across a carpet and then touch a metal doorknob. You feel a small shock. What caused the shock?",
      choices: [
        "The doorknob was already charged and repelled you",
        "Walking transferred charge to you; touching the metal allowed it to discharge rapidly",
        "The carpet generated electricity and sent it through your body",
        "Metal doorknobs always produce shocks when touched"
      ],
      answer: "Walking transferred charge to you; touching the metal allowed it to discharge rapidly",
      explanation: "Shuffling on carpet transferred electrons, charging your body. The metal doorknob is a conductor. When you touch it, the excess charge moves rapidly, producing a spark and a shock sensation."
    },
 
    {
      id: "cc015",
      mode: "charge-clash",
      topic: "static_electricity",
      difficulty: 2,
      type: "multiple_choice",
      prompt: "Static charge tends to build up more easily on insulators than on conductors. Why?",
      choices: [
        "Insulators have more electrons than conductors",
        "On insulators, charge stays where it is deposited and cannot spread away",
        "Conductors repel all incoming charge",
        "Insulators attract charge from the air more easily"
      ],
      answer: "On insulators, charge stays where it is deposited and cannot spread away",
      explanation: "Insulators do not allow electrons to move freely. Charge deposited in one spot stays there. On conductors, charge quickly spreads or flows away."
    },
 
    {
      id: "cc016",
      mode: "charge-clash",
      topic: "static_electricity",
      difficulty: 2,
      type: "multiple_choice",
      prompt: "A student charges a plastic rod by rubbing it with wool. Plastic is an insulator. Where does the excess charge reside?",
      choices: [
        "It spreads evenly across the entire rod instantly",
        "It remains concentrated where the rubbing occurred",
        "It flows to the student's hand immediately",
        "It dissipates into the air within seconds"
      ],
      answer: "It remains concentrated where the rubbing occurred",
      explanation: "Plastic is an insulator. Electrons cannot flow through it, so charge stays near where it was deposited by rubbing."
    },
 
    {
      id: "cc017",
      mode: "charge-clash",
      topic: "electron_transfer",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "An object gains electrons. What happens to its overall charge?",

        "It becomes more positive",
        "It becomes more negative",
        "It stays neutral",
        "It becomes magnetic"

      answer: "It becomes more negative",
      explanation: "Gaining electrons adds negative charge. The object now has more negative particles than positive, making it negatively charged overall."
    },
 
    {
      id: "cc018",
      mode: "charge-clash",
      topic: "electron_transfer",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "An object loses electrons. What happens to its overall charge?",
      choices: [
        "It becomes more negative",
        "It becomes more positive",
        "It stays neutral",
        "It loses protons"
      ],
      answer: "It becomes more positive",
      explanation: "Losing electrons removes negative charge. The object now has more protons than electrons, giving it a net positive charge."
    },
 
    {
      id: "cc019",
      mode: "charge-clash",
      topic: "electron_transfer",
      difficulty: 1,
      type: "multiple_choice",
      prompt: "In static electricity, why do electrons transfer rather than protons?",

        "Protons are locked in the nucleus; electrons are on the outside and can be moved",
        "Electrons are heavier and easier to push",
        "Protons are transferred in liquids only"

      topic: "electron_transfer",

        "Positive, because electrons outnumber protons"

      answer: "Negative, because it has more electrons",

    },

      id: "cc021",
      mode: "charge-clash",

      difficulty: 2,

        "No charge movement occurs because one object is neutral"
      ],
      answer: "Some electrons move from Object A to Object B until charge distributes more evenly",

    },
 
    {
      id: "cc022",
      mode: "charge-clash",
      topic: "electron_transfer",
      difficulty: 2,
      type: "multiple_choice",
      prompt: "A student says: 'Rubbing creates charge.' What is the more accurate description?",

        "Rubbing creates new electrons from friction energy",
        "Rubbing converts neutrons into electrons",

        "Rubbing destroys protons, leaving excess electrons"

      answer: "Rubbing transfers existing electrons from one object to another",

    },
 
    {
      id: "cc023",
      mode: "charge-clash",

        "Rubber",
        "Plastic",
        "Copper",
        "Glass"

    },

let MODES=[chargeClashMode,coulombChaosMode,ionicSurvivalMode,lightningBuilderMode];

let currentMode=null, currentQuestion=null, usedIds=[], answered=false, isBoss=false;
let total=0, correct=0, streak=0, bestStreak=0, bossCorrect=0, bossTotal=0, questionCount=0;
let topicStats={};

function init(){
  Object.keys(TOPICS).forEach(t=>topicStats[t]={seen:0,correct:0,weakness:0,recovered:false});
  renderModes();
}

function getModeRecord(modeId){
  const records = JSON.parse(localStorage.getItem("chemReviewRecords") || "{}");

  return records[modeId] || {
    bestScore: 0,
    bestTotal: 0,
    bestPercent: 0,
    bestStreak: 0,
    bossCorrect: 0,
    bossTotal: 0
  };
}

function saveModeRecord(modeId,score,total,streak,bossCorrect,bossTotal){
  if(!modeId || total === 0) return;

  const records = JSON.parse(localStorage.getItem("chemReviewRecords") || "{}");

  const old = records[modeId] || {
    bestScore: 0,
    bestTotal: 0,
    bestPercent: 0,
    bestStreak: 0,
    bossCorrect: 0,
    bossTotal: 0
  };

  const percent = total ? Math.round((score / total) * 100) : 0;

  records[modeId] = {
    bestScore: percent > old.bestPercent ? score : old.bestScore,
    bestTotal: percent > old.bestPercent ? total : old.bestTotal,
    bestPercent: Math.max(percent, old.bestPercent || 0),
    bestStreak: Math.max(streak, old.bestStreak || 0),
    bossCorrect: Math.max(bossCorrect, old.bossCorrect || 0),
    bossTotal: Math.max(bossTotal, old.bossTotal || 0)
  };

  localStorage.setItem("chemReviewRecords", JSON.stringify(records));
}
 
function renderModes(){
  const grid=document.getElementById("modeGrid");
  grid.innerHTML="";
  MODES.forEach(m=>{
    const div=document.createElement("div");
    div.className="mode-card";
    div.onclick=()=>startMode(m.id);

    const record=getModeRecord(m.id);

    div.innerHTML=`
      <h2>${m.title}</h2>
      <p>${m.subtitle}</p>
      <p style="margin-top:10px;color:var(--green);font-weight:800">
        ${m.questions.length} questions + ${m.bossQuestions.length} boss levels
      </p>
      <p style="margin-top:8px;color:var(--gold);font-weight:800">
        Browser Record: ${record.bestScore}/${record.bestTotal} (${record.bestPercent}%) | Best Streak: ${record.bestStreak}
      </p>
    `
    grid.appendChild(div);
  });
}
function startMode(id){
  currentMode=MODES.find(m=>m.id===id);
  total=0;correct=0;streak=0;bestStreak=0;bossCorrect=0;bossTotal=0;questionCount=0;usedIds=[];answered=false;
  Object.keys(TOPICS).forEach(t=>topicStats[t]={seen:0,correct:0,weakness:0,recovered:false});  
  document.getElementById("currentModeLabel").textContent=currentMode.title;
  show("gameScreen");
  nextQuestion();
}
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goMenu(){
  if(currentMode){
  saveModeRecord(
    currentMode.id,
    correct,
    total,
    bestStreak,
    bossCorrect,
    bossTotal
    );
  }
  document.getElementById("currentModeLabel").textContent="Choose a mode";
  updatePills();
  show("menuScreen");
  renderModes();
}
function chooseQuestion(){
  questionCount++;

  const bossDue = (streak>0 && streak%5===0) || (questionCount%10===0);

  if(bossDue && currentMode.bossQuestions.length){
    const available=currentMode.bossQuestions.filter(q=>!usedIds.includes(q.id));
    if(available.length){
      isBoss=true;
      return available[Math.floor(Math.random()*available.length)];
    }
  }

  isBoss=false;

  let pool=currentMode.questions.filter(q=>!usedIds.includes(q.id));

  if(pool.length===0){
    usedIds=[];
    pool=currentMode.questions;
  }

  if(questionCount>5){
    const weakTopics=Object.entries(topicStats)
      .filter(([t,s]) => s.weakness >= 2 && currentMode.topics.includes(t))
      .map(([t]) => t);

    const recoveryPool=pool.filter(q=>weakTopics.includes(q.topic));

    if(recoveryPool.length && Math.random()<0.65){
      pool=recoveryPool;
    }
  }

  return pool[Math.floor(Math.random()*pool.length)];
}
function nextQuestion(){
  if(total>=25){return finalReport();}
  currentQuestion=chooseQuestion();
  if(!currentQuestion){return finalReport();}
  usedIds.push(currentQuestion.id);
  answered=false;
  document.getElementById("nextBtn").disabled=true;
  document.getElementById("bossBanner").classList.toggle("show",isBoss);
  document.getElementById("questionMeta").textContent=`${TOPICS[currentQuestion.topic] || currentQuestion.topic} | Difficulty ${currentQuestion.difficulty}`;
  document.getElementById("promptText").textContent=currentQuestion.prompt;
  document.getElementById("feedbackBox").textContent="Choose the best answer.";
  const grid=document.getElementById("answerGrid");
  grid.innerHTML="";
  shuffle([...currentQuestion.choices]).forEach(choice=>{
    const b=document.createElement("button");
    b.className="answer-btn";
    b.textContent=choice;
    b.onclick=()=>answer(choice,b);
    grid.appendChild(b);
  });
  updatePills();
}
function answer(choice,btn){
  if(answered)return;
  answered=true; total++;
  if(isBoss) bossTotal++;
  const right=choice===currentQuestion.answer;
  topicStats[currentQuestion.topic].seen++;
  if(right){
    correct++; streak++; 
    bestStreak=Math.max(bestStreak,streak);
    topicStats[currentQuestion.topic].correct++;
    topicStats[currentQuestion.topic].weakness=Math.max(0,topicStats[currentQuestion.topic].weakness-1);

      if(topicStats[currentQuestion.topic].weakness === 0){
        topicStats[currentQuestion.topic].recovered = true;
      }
    btn.classList.add("correct");
    document.getElementById("feedbackBox").innerHTML=`<b style="color:var(--green)">Correct.</b> ${currentQuestion.explanation}`;
    if(isBoss){bossCorrect++; bigCelebrate("BOSS DEFEATED! ⚛️");}
    else if(streak%3===0){bigCelebrate(randomCelebration());}
    else smallParticles();
  }else{
    streak=0;
    topicStats[currentQuestion.topic].weakness+=2;

    if(topicStats[currentQuestion.topic].weakness >= 4){
      document.getElementById("topicPill").textContent =
        "Recovery Focus: " + (TOPICS[currentQuestion.topic] || currentQuestion.topic);
    }
    btn.classList.add("wrong");
    [...document.querySelectorAll(".answer-btn")].forEach(b=>{if(b.textContent===currentQuestion.answer)b.classList.add("correct")});
    document.getElementById("feedbackBox").innerHTML=`<b style="color:var(--red)">Not quite.</b> ${currentQuestion.explanation}`;
  }
  document.getElementById("nextBtn").disabled=false;
  updatePills();
}
function updatePills(){
  document.getElementById("scorePill").textContent=`Score: ${correct}/${total}`;
  document.getElementById("streakPill").textContent=`Streak: ${streak}`;
  const weakest=getWeakestTopic();
  document.getElementById("topicPill").textContent=weakest?`Adaptive Review: ${TOPICS[weakest]}`:"Adaptive Review: Ready";
}
function getWeakestTopic(){
  let arr=Object.entries(topicStats).filter(([t,s])=>s.seen>0).sort((a,b)=>b[1].weakness-a[1].weakness);
  return arr.length && arr[0][1].weakness>0 ? arr[0][0] : null;
}
function finalReport(){
  const strong=[], almost=[], weak=[];
  saveModeRecord(currentMode.id,correct,total,bestStreak,bossCorrect,bossTotal);
  Object.entries(topicStats).forEach(([t,s])=>{
    if(s.seen===0)return;
    const pct=s.correct/s.seen;
    if(pct>=.85) strong.push(TOPICS[t]);
    else if(pct>=.70) almost.push(TOPICS[t]);
    else weak.push(TOPICS[t]);
  });
  document.getElementById("finalReport").innerHTML=`
    <h2>Final Review Report</h2>
    <div class="report-grid">
      <div class="report-card"><h3>Score</h3><p style="font-size:2rem;margin:0;color:var(--gold)">${correct}/${total}</p></div>
      <div class="report-card"><h3>Boss Levels</h3><p style="font-size:2rem;margin:0;color:var(--blue)">${bossCorrect}/${bossTotal}</p></div>
      <div class="report-card"><h3>Best Streak</h3><p>Keep chasing chemistry combos.</p></div>
    </div>
    <div class="report-grid" style="margin-top:10px">
      <div class="report-card"><h3 style="color:var(--green)">Strong</h3><p>${strong.length?strong.join("<br>"):"None yet — keep practicing."}</p></div>
      <div class="report-card"><h3 style="color:var(--gold)">Almost There</h3><p>${almost.length?almost.join("<br>"):"None listed."}</p></div>
      <div class="report-card"><h3 style="color:var(--red)">Study Before Test</h3><p>${weak.length?weak.join("<br>"):"No major weak areas identified."}</p></div>
    </div>
    <p style="color:var(--muted);font-weight:700">Tip: replay this mode or switch modes. The game increases weak-topic practice during each session, but does not save student data.</p>`;
  show("finalScreen");
}
function bigCelebrate(text){
  const o=document.getElementById("celebrationOverlay");
  o.textContent=text;
  o.classList.remove("show"); void o.offsetWidth; o.classList.add("show");
  smallParticles(35);
}
function smallParticles(n=14){
  const symbols=["⚛️","e⁻","Na⁺","Cl⁻","⚡","H₂O","＋","−"];
  for(let i=0;i<n;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(1.1+Math.random()*1.2)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2300);
  }
}
function randomCelebration(){return celebrations[Math.floor(Math.random()*celebrations.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
init();
</script>
