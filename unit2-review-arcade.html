<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChemReviewLab | Unit 2 Chemistry Review Arcade</title>
<style>
:root{
  --bg:#07111f;--panel:#0f1d2f;--panel2:#14263d;--blue:#35a7ff;--green:#4ade80;
  --gold:#fbbf24;--red:#fb7185;--text:#f8fafc;--muted:#b6c3d1;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#12365d,#07111f 55%);color:var(--text)}
.app-shell{height:100vh;display:flex;flex-direction:column;padding:10px;gap:8px}
.app-header{display:flex;justify-content:space-between;align-items:center;background:rgba(15,29,47,.9);border:1px solid rgba(53,167,255,.25);border-radius:16px;padding:10px 14px;min-height:68px}
.brand-title{font-size:1.15rem;font-weight:800;color:var(--blue)}
.unit-title{font-size:.95rem;color:var(--muted)}
.mode-title{font-weight:800;color:var(--gold)}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.score-pill,.streak-pill,.topic-pill{padding:7px 10px;border-radius:999px;background:var(--panel2);border:1px solid rgba(255,255,255,.12);font-weight:700;font-size:.85rem}
.streak-pill{color:var(--green)}
.app-main{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
.screen{height:100%;min-height:0;display:none}
.screen.active{display:flex;flex-direction:column}
.mode-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-content:center}
.mode-card{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid rgba(53,167,255,.25);border-radius:18px;padding:18px;cursor:pointer;box-shadow:0 12px 24px rgba(0,0,0,.25)}
.mode-card:hover{outline:2px solid var(--blue);transform:translateY(-1px)}
.mode-card h2{margin:0 0 8px;color:var(--gold)}
.mode-card p{margin:0;color:var(--muted);line-height:1.35}
.question-card{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;gap:10px;background:rgba(15,29,47,.93);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:14px}
.boss-banner{display:none;text-align:center;background:linear-gradient(90deg,#7c2d12,#f59e0b,#7c2d12);padding:8px;border-radius:14px;font-weight:900;color:#fff}
.boss-banner.show{display:block}
.prompt{font-size:clamp(1.05rem,2.5vw,1.65rem);line-height:1.25;font-weight:800;text-align:center;margin:auto 0}
.answer-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.answer-btn{border:1px solid rgba(255,255,255,.16);background:#132842;color:var(--text);padding:13px;border-radius:14px;font-size:clamp(.92rem,1.6vw,1.08rem);font-weight:750;cursor:pointer;min-height:58px}
.answer-btn:hover{outline:2px solid var(--blue)}
.answer-btn.correct{background:#14532d}
.answer-btn.wrong{background:#7f1d1d}
.feedback-box{min-height:52px;background:rgba(255,255,255,.06);border-radius:14px;padding:10px;text-align:center;color:var(--muted);font-weight:650}
.nav-row{display:flex;gap:10px;justify-content:center}
button.primary{background:linear-gradient(90deg,var(--blue),#2563eb);color:white;border:0;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer}
button.secondary{background:#1e293b;color:white;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer}
.final-report{flex:1;overflow:auto;background:rgba(15,29,47,.94);border-radius:20px;padding:18px;border:1px solid rgba(255,255,255,.14)}
.final-report h2{color:var(--gold);margin-top:0}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.report-card{background:rgba(255,255,255,.06);border-radius:14px;padding:12px}
.app-footer{text-align:center;color:var(--muted);font-size:.8rem;min-height:18px}
.celebration-overlay{position:fixed;inset:0;pointer-events:none;display:none;align-items:center;justify-content:center;z-index:10;background:rgba(7,17,31,.35);font-size:clamp(2rem,6vw,5rem);font-weight:1000;text-align:center}
.celebration-overlay.show{display:flex;animation:fade .9s ease forwards}
.particle{position:fixed;top:-20px;font-size:22px;animation:fall 1.7s linear forwards;z-index:11}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
@keyframes fade{0%{opacity:0;transform:scale(.8)}20%{opacity:1;transform:scale(1.04)}100%{opacity:0;transform:scale(1)}}
@media(max-width:760px){
  .app-header{align-items:flex-start;gap:6px;flex-direction:column}
  .status-bar{justify-content:flex-start}
  .mode-grid{grid-template-columns:1fr}
  .answer-grid{grid-template-columns:1fr}
  .report-grid{grid-template-columns:1fr}
  .app-footer{display:none}
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div>
      <div class="brand-title">ChemReviewLab</div>
      <div class="unit-title">Unit 2 Chemistry Review Arcade</div>
      <div class="mode-title" id="currentModeLabel">Choose a mode</div>
    </div>
    <div class="status-bar">
      <div class="score-pill" id="scorePill">Score: 0/0</div>
      <div class="streak-pill" id="streakPill">Streak: 0</div>
      <div class="topic-pill" id="topicPill">Adaptive Review: Ready</div>
    </div>
  </header>

  <main class="app-main">
    <section id="menuScreen" class="screen active">
      <div class="mode-grid" id="modeGrid"></div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="question-card">
        <div class="boss-banner" id="bossBanner">BOSS LEVEL: Use the model, not just memory.</div>
        <div class="topic-pill" id="questionMeta">Topic</div>
        <div class="prompt" id="promptText">Question</div>
        <div class="answer-grid" id="answerGrid"></div>
        <div class="feedback-box" id="feedbackBox">Choose the best answer.</div>
        <div class="nav-row">
          <button class="secondary" onclick="goMenu()">Modes</button>
          <button class="primary" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
        </div>
      </div>
    </section>

    <section id="finalScreen" class="screen">
      <div class="final-report" id="finalReport"></div>
      <div class="nav-row" style="margin-top:8px">
        <button class="secondary" onclick="goMenu()">Back to Modes</button>
        <button class="primary" onclick="startMode(currentMode.id)">Play Again</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">OpenSciEd Chemistry C.2 Review Tool | No login | No student data stored</footer>
</div>

<div class="celebration-overlay" id="celebrationOverlay"></div>

<script>
const TOPICS = {
  subatomic_particles:"Subatomic Particles",
  charge_interactions:"Charge Interactions",
  net_charge:"Net Charge",
  electron_transfer:"Electron Transfer",
  polarization:"Polarization",
  coulombs_law:"Coulomb's Law",
  lightning_formation:"Lightning Formation",
  ionized_air:"Ionized Air",
  conductors_insulators:"Conductors & Insulators",
  ionic_vs_molecular:"Ionic vs Molecular",
  dissolving_salt:"Dissolving Salt",
  aqueous_conductivity:"Aqueous Conductivity",
  lightning_safety:"Lightning Safety",
  model_explanations:"Model Explanations"
};

const celebrations = [
  "Electron Energy Surge!","Ionic Victory!","You’re Positively Charged!",
  "Bond Level: Strong!","Lightning Logic Unlocked!","Conductivity Combo!",
  "Nucleus-Level Thinking!","That Answer Was Electrifying!","Periodic Power-Up!",
  "Saltwater Superstar!","Ion Trail Activated!","Molecule Mastery!"
];

const chargeClashMode = {
id:"charge-clash",
title:"Charge Clash",
subtitle:"Master atoms, charge, attraction, repulsion, electron transfer, and polarization.",
topics:["subatomic_particles","charge_interactions","net_charge","electron_transfer","polarization","model_explanations"],
questions:[
{id:"cc001",mode:"charge-clash",topic:"charge_interactions",difficulty:1,type:"multiple_choice",prompt:"A negatively charged piece of tinsel is brought near a positively charged metal bucket. What interaction should happen?",choices:["They attract","They repel","There is no interaction","They both become neutral instantly"],answer:"They attract",explanation:"Opposite charges attract, so negative tinsel is pulled toward the positive bucket."},
{id:"cc002",mode:"charge-clash",topic:"charge_interactions",difficulty:1,type:"multiple_choice",prompt:"A negatively charged PVC pipe is brought near negatively charged tinsel. What happens?",choices:["They attract","They repel","They become molecular","The tinsel becomes a proton"],answer:"They repel",explanation:"Like charges repel. Negative and negative push away from each other."},
{id:"cc003",mode:"charge-clash",topic:"charge_interactions",difficulty:1,type:"multiple_choice",prompt:"Two neutral pieces of paper are brought close together. What is the best prediction?",choices:["Strong attraction","Strong repulsion","Little to no electrostatic interaction","They become ions"],answer:"Little to no electrostatic interaction",explanation:"Neutral objects usually do not strongly attract or repel unless charge separation is induced."},
{id:"cc004",mode:"charge-clash",topic:"subatomic_particles",difficulty:1,type:"multiple_choice",prompt:"Which three particles make up atoms?",choices:["Protons, neutrons, electrons","Ions, molecules, compounds","Solids, liquids, gases","Clouds, lightning, air"],answer:"Protons, neutrons, electrons",explanation:"Atoms contain protons and neutrons in the nucleus, with electrons around the nucleus."},
{id:"cc005",mode:"charge-clash",topic:"subatomic_particles",difficulty:1,type:"multiple_choice",prompt:"Which particle has a negative charge?",choices:["Proton","Neutron","Electron","Nucleus"],answer:"Electron",explanation:"Electrons are negatively charged and can move between objects in static electricity."},
{id:"cc006",mode:"charge-clash",topic:"subatomic_particles",difficulty:1,type:"multiple_choice",prompt:"Which particle has a positive charge?",choices:["Proton","Neutron","Electron","Molecule"],answer:"Proton",explanation:"Protons are positively charged and are located in the nucleus."},
{id:"cc007",mode:"charge-clash",topic:"subatomic_particles",difficulty:1,type:"multiple_choice",prompt:"Which particle has no electric charge?",choices:["Proton","Neutron","Electron","Ion"],answer:"Neutron",explanation:"Neutrons are neutral particles in the nucleus."},
{id:"cc008",mode:"charge-clash",topic:"net_charge",difficulty:2,type:"multiple_choice",prompt:"An object has more electrons than protons. What is its net charge?",choices:["Positive","Negative","Neutral","Molecular"],answer:"Negative",explanation:"Extra electrons give an object a net negative charge."},
{id:"cc009",mode:"charge-clash",topic:"net_charge",difficulty:2,type:"multiple_choice",prompt:"An object loses electrons. What happens to its net charge?",choices:["It becomes more positive","It becomes more negative","It becomes a neutron","It loses all mass"],answer:"It becomes more positive",explanation:"Losing negative electrons leaves the object with more positive charge overall."},
{id:"cc010",mode:"charge-clash",topic:"electron_transfer",difficulty:2,type:"multiple_choice",prompt:"In most classroom static electricity examples, what moves from one object to another?",choices:["Protons","Neutrons","Electrons","Nuclei"],answer:"Electrons",explanation:"Static charge usually forms because electrons transfer between materials."},
{id:"cc011",mode:"charge-clash",topic:"polarization",difficulty:2,type:"multiple_choice",prompt:"A charged balloon sticks to a neutral wall. What is the best explanation?",choices:["The wall becomes permanently negative","Charges in the wall shift slightly","The balloon creates protons","The wall becomes ionic"],answer:"Charges in the wall shift slightly",explanation:"The charged balloon induces polarization in the neutral wall, creating attraction."},
{id:"cc012",mode:"charge-clash",topic:"polarization",difficulty:2,type:"multiple_choice",prompt:"During polarization, are electrons transferred into the neutral object?",choices:["Always","Usually not","Only protons move","Only neutrons move"],answer:"Usually not",explanation:"Polarization is a temporary shifting of charge inside the object, not full electron transfer."},
{id:"cc013",mode:"charge-clash",topic:"model_explanations",difficulty:2,type:"multiple_choice",prompt:"A good particle-level model of balloon-wall attraction should include what?",choices:["Only the balloon","Shifted charges in the wall","A chemical equation","Only the wall color"],answer:"Shifted charges in the wall",explanation:"The model should show how a charged object induces partial charge separation in a neutral object."},
{id:"cc014",mode:"charge-clash",topic:"charge_interactions",difficulty:1,type:"multiple_choice",prompt:"Which pair repels?",choices:["Positive and negative","Negative and neutral always","Positive and positive","Neutral and neutral strongly"],answer:"Positive and positive",explanation:"Like charges repel, so two positive objects repel."},
{id:"cc015",mode:"charge-clash",topic:"charge_interactions",difficulty:1,type:"multiple_choice",prompt:"Which pair attracts most directly because of charge?",choices:["Negative and negative","Positive and positive","Positive and negative","Neutral and neutral"],answer:"Positive and negative",explanation:"Opposite charges attract."}
],
bossQuestions:[
{id:"ccb01",mode:"charge-clash",topic:"polarization",difficulty:3,type:"multiple_choice",prompt:"Boss: A negatively charged balloon sticks to a neutral wall. Which model best explains this?",choices:["The wall’s electrons shift slightly away, leaving the near side partially positive","The wall gains many protons from the balloon","The balloon becomes neutral before touching the wall","The wall turns into saltwater"],answer:"The wall’s electrons shift slightly away, leaving the near side partially positive",explanation:"A negative balloon repels electrons in the wall slightly, making the nearby wall surface partially positive. Opposite charge regions attract."},
{id:"ccb02",mode:"charge-clash",topic:"electron_transfer",difficulty:3,type:"multiple_choice",prompt:"Boss: A student says, 'The object became negative because it gained protons.' What correction is best?",choices:["It became negative because it gained electrons","It became negative because neutrons left","It became negative because protons are negative","It became negative because molecules disappeared"],answer:"It became negative because it gained electrons",explanation:"Negative charge comes from extra electrons. Protons usually stay in the nucleus and do not transfer in static electricity."},
{id:"ccb03",mode:"charge-clash",topic:"model_explanations",difficulty:3,type:"multiple_choice",prompt:"Boss: Which explanation best connects particle scale to object-scale attraction?",choices:["Tiny charge shifts can create attractive forces between larger objects","Large objects attract only because of color","Neutral objects can never interact with charged objects","Only magnets can create forces at a distance"],answer:"Tiny charge shifts can create attractive forces between larger objects",explanation:"Small-scale charge patterns can produce forces that we observe at the object scale."}
]};

const coulombChaosMode = {
id:"coulomb-chaos",
title:"Coulomb Chaos",
subtitle:"Predict how charge amount and distance change electrostatic force.",
topics:["coulombs_law","charge_interactions"],
questions:[
{id:"co001",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:1,type:"multiple_choice",prompt:"Two charged objects move farther apart. What happens to the electrostatic force?",choices:["It gets weaker","It gets stronger","It stays exactly the same","It becomes gravity"],answer:"It gets weaker",explanation:"Electrostatic force decreases as distance increases."},
{id:"co002",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:1,type:"multiple_choice",prompt:"Two objects have larger charges. What happens to the force between them if distance stays the same?",choices:["Force increases","Force decreases","Force disappears","Distance becomes zero"],answer:"Force increases",explanation:"Greater charge magnitude creates a stronger electrostatic force."},
{id:"co003",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:2,type:"multiple_choice",prompt:"Which situation has the strongest force?",choices:["Small charges far apart","Large charges close together","Small charges close together","Large charges far apart"],answer:"Large charges close together",explanation:"Force is strongest with larger charges and shorter distance."},
{id:"co004",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:2,type:"multiple_choice",prompt:"In Coulomb’s law, distance has a powerful effect because it is...",choices:["squared in the denominator","added to the charge","always zero","measured in grams"],answer:"squared in the denominator",explanation:"Because distance is squared in the denominator, increasing distance greatly reduces force."},
{id:"co005",mode:"coulomb-chaos",topic:"charge_interactions",difficulty:1,type:"multiple_choice",prompt:"Coulomb’s law can describe attraction or repulsion between...",choices:["charged objects","only neutral objects","only liquids","only sound waves"],answer:"charged objects",explanation:"Coulomb’s law predicts electrostatic force between charges."},
{id:"co006",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:2,type:"multiple_choice",prompt:"If the distance between charges doubles, the force becomes...",choices:["about one-fourth as strong","twice as strong","exactly the same","four times stronger"],answer:"about one-fourth as strong",explanation:"Force follows an inverse-square relationship with distance."},
{id:"co007",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:2,type:"multiple_choice",prompt:"If one charge doubles and distance stays the same, the force...",choices:["doubles","is cut in half","becomes zero","becomes neutral"],answer:"doubles",explanation:"Force is proportional to the size of each charge."},
{id:"co008",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:2,type:"multiple_choice",prompt:"Why can lightning involve huge forces compared with classroom static?",choices:["Storm clouds build up massive amounts of charge","Air is always metal","Clouds have no electrons","Distance never matters"],answer:"Storm clouds build up massive amounts of charge",explanation:"Large charge buildup in clouds can create strong electric fields and forces."}
],
bossQuestions:[
{id:"cob01",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:3,type:"multiple_choice",prompt:"Boss: Two lightning paths are possible. Path A is shorter but has less charge separation. Path B is longer but has much more charge buildup. What should you consider?",choices:["Both charge amount and distance affect force","Only distance matters","Only color matters","Only temperature matters"],answer:"Both charge amount and distance affect force",explanation:"Coulomb’s law connects force to charge amount and distance. Stronger charge can matter, but greater distance weakens force."},
{id:"cob02",mode:"coulomb-chaos",topic:"coulombs_law",difficulty:3,type:"multiple_choice",prompt:"Boss: Why does moving charged objects farther apart quickly weaken their interaction?",choices:["Force decreases with the square of distance","Electrons become protons","Charges stop existing","Objects become molecular"],answer:"Force decreases with the square of distance",explanation:"The inverse-square distance relationship means even modest increases in distance can greatly reduce force."}
]};

const ionicSurvivalMode = {
id:"ionic-survival",
title:"Ionic Survival",
subtitle:"Sort compounds, dissolve salt, and explain why solutions conduct.",
topics:["ionic_vs_molecular","dissolving_salt","aqueous_conductivity","conductors_insulators"],
questions:[
{id:"io001",mode:"ionic-survival",topic:"ionic_vs_molecular",difficulty:1,type:"multiple_choice",prompt:"NaCl is best classified as...",choices:["Ionic","Molecular","A single atom","A neutron"],answer:"Ionic",explanation:"NaCl is made from a metal and nonmetal and forms ions."},
{id:"io002",mode:"ionic-survival",topic:"ionic_vs_molecular",difficulty:1,type:"multiple_choice",prompt:"H₂O is best classified as...",choices:["Molecular","Ionic","Metallic","A proton"],answer:"Molecular",explanation:"Water is made of nonmetals bonded together as molecules."},
{id:"io003",mode:"ionic-survival",topic:"ionic_vs_molecular",difficulty:1,type:"multiple_choice",prompt:"CaO is best classified as...",choices:["Ionic","Molecular","Neutral paper","An electron"],answer:"Ionic",explanation:"Calcium is a metal and oxygen is a nonmetal, so CaO is ionic."},
{id:"io004",mode:"ionic-survival",topic:"ionic_vs_molecular",difficulty:1,type:"multiple_choice",prompt:"CCl₄ is best classified as...",choices:["Molecular","Ionic","A salt solution","A nucleus"],answer:"Molecular",explanation:"Carbon and chlorine are nonmetals, so this is a molecular compound."},
{id:"io005",mode:"ionic-survival",topic:"dissolving_salt",difficulty:2,type:"multiple_choice",prompt:"What happens when NaCl dissolves in water?",choices:["Na⁺ and Cl⁻ ions separate and spread out","NaCl turns into protons","Water becomes pure metal","Electrons disappear"],answer:"Na⁺ and Cl⁻ ions separate and spread out",explanation:"Polar water pulls ions from the salt crystal into solution."},
{id:"io006",mode:"ionic-survival",topic:"aqueous_conductivity",difficulty:2,type:"multiple_choice",prompt:"Why does saltwater conduct electricity better than pure water?",choices:["It contains moving ions","It contains large protons","It has no particles","It is colder"],answer:"It contains moving ions",explanation:"Dissolved ions can move through the solution and carry charge."},
{id:"io007",mode:"ionic-survival",topic:"aqueous_conductivity",difficulty:2,type:"multiple_choice",prompt:"A solid dissolves in water and makes a colorless solution. Is that alone enough to prove it is ionic?",choices:["No, more evidence is needed","Yes, all colorless solutions are ionic","Yes, all dissolved solids conduct","No, because ionic compounds never dissolve"],answer:"No, more evidence is needed",explanation:"Both ionic and molecular substances can dissolve. Conductivity evidence would help identify ions."},
{id:"io008",mode:"ionic-survival",topic:"conductors_insulators",difficulty:1,type:"multiple_choice",prompt:"A conductor is a material that...",choices:["allows charge to move easily","blocks all motion forever","has only neutrons","cannot contain atoms"],answer:"allows charge to move easily",explanation:"Conductors allow charges to move through them."},
{id:"io009",mode:"ionic-survival",topic:"ionic_vs_molecular",difficulty:2,type:"multiple_choice",prompt:"Mg(OH)₂ is best classified as...",choices:["Ionic","Molecular","Only oxygen","Only hydrogen"],answer:"Ionic",explanation:"It contains Mg²⁺ and hydroxide ions, so it is ionic."},
{id:"io010",mode:"ionic-survival",topic:"ionic_vs_molecular",difficulty:2,type:"multiple_choice",prompt:"C₆H₁₂O₆ is best classified as...",choices:["Molecular","Ionic","Metallic","Ionized air"],answer:"Molecular",explanation:"Glucose is made of nonmetal atoms bonded as molecules."}
],
bossQuestions:[
{id:"iob01",mode:"ionic-survival",topic:"dissolving_salt",difficulty:3,type:"multiple_choice",prompt:"Boss: Which model best shows NaCl dissolving in water?",choices:["Na⁺ and Cl⁻ ions separated and surrounded by water molecules","Whole NaCl blocks floating unchanged forever","Protons leaving sodium nuclei","Water turning into lightning"],answer:"Na⁺ and Cl⁻ ions separated and surrounded by water molecules",explanation:"Dissolving ionic compounds means ions separate and become surrounded by polar water molecules."},
{id:"iob02",mode:"ionic-survival",topic:"aqueous_conductivity",difficulty:3,type:"multiple_choice",prompt:"Boss: Why are aqueous ionic compounds often conductive?",choices:["Their dissolved ions can move and carry charge","Their molecules become neutrons","Their protons leave the nucleus","Their water disappears"],answer:"Their dissolved ions can move and carry charge",explanation:"Mobile ions in solution allow electric charge to flow."}
]};

const placeholderLightningMode = {
id:"lightning-builder",
title:"Lightning Builder",
subtitle:"Claude’s mode placeholder. Paste Claude’s full lightningBuilderMode object later.",
topics:["lightning_formation","ionized_air","conductors_insulators","lightning_safety","aqueous_conductivity"],
questions:[
{id:"lb001",mode:"lightning-builder",topic:"lightning_formation",difficulty:1,type:"multiple_choice",prompt:"Inside a thundercloud, collisions between particles help create...",choices:["charge separation","solid salt","neutral paper only","sugar molecules"],answer:"charge separation",explanation:"Collisions in the cloud help separate charge, often leaving the cloud base negative."},
{id:"lb002",mode:"lightning-builder",topic:"ionized_air",difficulty:2,type:"multiple_choice",prompt:"Air normally does not conduct well. What must happen for lightning to pass through it?",choices:["Air particles must become ionized","Air must become wood","Air must lose all atoms","Air must become sugar"],answer:"Air particles must become ionized",explanation:"Strong electric fields can ionize air, creating a pathway for charge movement."},
{id:"lb003",mode:"lightning-builder",topic:"lightning_safety",difficulty:1,type:"multiple_choice",prompt:"Why should you avoid swimming during a lightning storm?",choices:["Water with dissolved ions can conduct electricity","Water always attracts all lightning","Water has no particles","Swimming creates protons"],answer:"Water with dissolved ions can conduct electricity",explanation:"Natural water contains dissolved ions that help charge move through it."}
],
bossQuestions:[
{id:"lbb01",mode:"lightning-builder",topic:"lightning_formation",difficulty:3,type:"multiple_choice",prompt:"Boss: What sequence best explains cloud-to-ground lightning?",choices:["Charge separates, air ionizes, a path connects, electrons rapidly move","Salt dissolves, sugar forms, paper burns, protons vanish","Water freezes, neutrons move, carbon bonds, light stops","Ground becomes molecular, clouds disappear, air becomes metal"],answer:"Charge separates, air ionizes, a path connects, electrons rapidly move",explanation:"Lightning requires charge separation, ionized air pathways, and rapid charge movement through the connected path."}
]};

let MODES=[chargeClashMode,coulombChaosMode,ionicSurvivalMode,placeholderLightningMode];

let currentMode=null, currentQuestion=null, usedIds=[], answered=false, isBoss=false;
let total=0, correct=0, streak=0, bossCorrect=0, bossTotal=0, questionCount=0;
let topicStats={};

function init(){
  Object.keys(TOPICS).forEach(t=>topicStats[t]={seen:0,correct:0,weakness:0});
  renderModes();
}
function renderModes(){
  const grid=document.getElementById("modeGrid");
  grid.innerHTML="";
  MODES.forEach(m=>{
    const div=document.createElement("div");
    div.className="mode-card";
    div.onclick=()=>startMode(m.id);
    div.innerHTML=`<h2>${m.title}</h2><p>${m.subtitle}</p><p style="margin-top:10px;color:var(--green);font-weight:800">${m.questions.length} questions + ${m.bossQuestions.length} boss levels</p>`;
    grid.appendChild(div);
  });
}
function startMode(id){
  currentMode=MODES.find(m=>m.id===id);
  total=0;correct=0;streak=0;bossCorrect=0;bossTotal=0;questionCount=0;usedIds=[];answered=false;
  Object.keys(TOPICS).forEach(t=>topicStats[t]={seen:0,correct:0,weakness:0});
  document.getElementById("currentModeLabel").textContent=currentMode.title;
  show("gameScreen");
  nextQuestion();
}
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goMenu(){
  document.getElementById("currentModeLabel").textContent="Choose a mode";
  updatePills();
  show("menuScreen");
}
function chooseQuestion(){
  questionCount++;
  const bossDue = (streak>0 && streak%5===0) || (questionCount%10===0);
  if(bossDue && currentMode.bossQuestions.length){
    const available=currentMode.bossQuestions.filter(q=>!usedIds.includes(q.id));
    if(available.length){isBoss=true; return available[Math.floor(Math.random()*available.length)];}
  }
  isBoss=false;
  let pool=currentMode.questions.filter(q=>!usedIds.includes(q.id));
  if(pool.length===0){return null;}
  if(questionCount>7){
    const weakTopics=Object.entries(topicStats).filter(([t,s])=>s.weakness>1).map(([t])=>t);
    const weakPool=pool.filter(q=>weakTopics.includes(q.topic));
    if(weakPool.length && Math.random()<0.45) pool=weakPool;
  }
  return pool[Math.floor(Math.random()*pool.length)];
}
function nextQuestion(){
  if(total>=25){return finalReport();}
  currentQuestion=chooseQuestion();
  if(!currentQuestion){return finalReport();}
  usedIds.push(currentQuestion.id);
  answered=false;
  document.getElementById("nextBtn").disabled=true;
  document.getElementById("bossBanner").classList.toggle("show",isBoss);
  document.getElementById("questionMeta").textContent=`${TOPICS[currentQuestion.topic] || currentQuestion.topic} | Difficulty ${currentQuestion.difficulty}`;
  document.getElementById("promptText").textContent=currentQuestion.prompt;
  document.getElementById("feedbackBox").textContent="Choose the best answer.";
  const grid=document.getElementById("answerGrid");
  grid.innerHTML="";
  shuffle([...currentQuestion.choices]).forEach(choice=>{
    const b=document.createElement("button");
    b.className="answer-btn";
    b.textContent=choice;
    b.onclick=()=>answer(choice,b);
    grid.appendChild(b);
  });
  updatePills();
}
function answer(choice,btn){
  if(answered)return;
  answered=true; total++;
  if(isBoss) bossTotal++;
  const right=choice===currentQuestion.answer;
  topicStats[currentQuestion.topic].seen++;
  if(right){
    correct++; streak++;
    topicStats[currentQuestion.topic].correct++;
    topicStats[currentQuestion.topic].weakness=Math.max(0,topicStats[currentQuestion.topic].weakness-1);
    btn.classList.add("correct");
    document.getElementById("feedbackBox").innerHTML=`<b style="color:var(--green)">Correct.</b> ${currentQuestion.explanation}`;
    if(isBoss){bossCorrect++; bigCelebrate("BOSS DEFEATED! ⚛️");}
    else if(streak%3===0){bigCelebrate(randomCelebration());}
    else smallParticles();
  }else{
    streak=0;
    topicStats[currentQuestion.topic].weakness+=2;
    btn.classList.add("wrong");
    [...document.querySelectorAll(".answer-btn")].forEach(b=>{if(b.textContent===currentQuestion.answer)b.classList.add("correct")});
    document.getElementById("feedbackBox").innerHTML=`<b style="color:var(--red)">Not quite.</b> ${currentQuestion.explanation}`;
  }
  document.getElementById("nextBtn").disabled=false;
  updatePills();
}
function updatePills(){
  document.getElementById("scorePill").textContent=`Score: ${correct}/${total}`;
  document.getElementById("streakPill").textContent=`Streak: ${streak}`;
  const weakest=getWeakestTopic();
  document.getElementById("topicPill").textContent=weakest?`Adaptive Review: ${TOPICS[weakest]}`:"Adaptive Review: Ready";
}
function getWeakestTopic(){
  let arr=Object.entries(topicStats).filter(([t,s])=>s.seen>0).sort((a,b)=>b[1].weakness-a[1].weakness);
  return arr.length && arr[0][1].weakness>0 ? arr[0][0] : null;
}
function finalReport(){
  const strong=[], almost=[], weak=[];
  Object.entries(topicStats).forEach(([t,s])=>{
    if(s.seen===0)return;
    const pct=s.correct/s.seen;
    if(pct>=.85) strong.push(TOPICS[t]);
    else if(pct>=.70) almost.push(TOPICS[t]);
    else weak.push(TOPICS[t]);
  });
  document.getElementById("finalReport").innerHTML=`
    <h2>Final Review Report</h2>
    <div class="report-grid">
      <div class="report-card"><h3>Score</h3><p style="font-size:2rem;margin:0;color:var(--gold)">${correct}/${total}</p></div>
      <div class="report-card"><h3>Boss Levels</h3><p style="font-size:2rem;margin:0;color:var(--blue)">${bossCorrect}/${bossTotal}</p></div>
      <div class="report-card"><h3>Best Streak</h3><p>Keep chasing chemistry combos.</p></div>
    </div>
    <div class="report-grid" style="margin-top:10px">
      <div class="report-card"><h3 style="color:var(--green)">Strong</h3><p>${strong.length?strong.join("<br>"):"None yet — keep practicing."}</p></div>
      <div class="report-card"><h3 style="color:var(--gold)">Almost There</h3><p>${almost.length?almost.join("<br>"):"None listed."}</p></div>
      <div class="report-card"><h3 style="color:var(--red)">Study Before Test</h3><p>${weak.length?weak.join("<br>"):"No major weak areas identified."}</p></div>
    </div>
    <p style="color:var(--muted);font-weight:700">Tip: replay this mode or switch modes. The game increases weak-topic practice during each session, but does not save student data.</p>`;
  show("finalScreen");
}
function bigCelebrate(text){
  const o=document.getElementById("celebrationOverlay");
  o.textContent=text;
  o.classList.remove("show"); void o.offsetWidth; o.classList.add("show");
  smallParticles(35);
}
function smallParticles(n=14){
  const symbols=["⚛️","e⁻","Na⁺","Cl⁻","⚡","H₂O","＋","−"];
  for(let i=0;i<n;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(1.1+Math.random()*1.2)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2300);
  }
}
function randomCelebration(){return celebrations[Math.floor(Math.random()*celebrations.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
init();
</script>
